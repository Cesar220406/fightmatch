version: '3.9'

# ── Uso: docker compose -f docker-compose.prod.yml up -d --build ──────────────

services:
  # ──────────────────────────────────────────────────────────────────────────
  # Base de datos
  # ──────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fightmatch_db
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fightmatch_net

  # ──────────────────────────────────────────────────────────────────────────
  # Backend Express
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: fightmatch_backend
    restart: always
    environment:
      NODE_ENV:     production
      PORT:         4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET:   ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN:  https://${DOMAIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fightmatch_net

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend Next.js
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    container_name: fightmatch_frontend
    restart: always
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://backend:4000/api
    depends_on:
      - backend
    networks:
      - fightmatch_net

  # ──────────────────────────────────────────────────────────────────────────
  # Nginx — proxy inverso + SSL
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: fightmatch_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fightmatch_net

  # ──────────────────────────────────────────────────────────────────────────
  # Certbot — renovación automática SSL
  # ──────────────────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: fightmatch_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  db_data:
  certbot_www:
  certbot_certs:

networks:
  fightmatch_net:
    driver: bridge
