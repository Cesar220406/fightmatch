version: '3.9'

services:
  # ──────────────────────────────────────────
  # Base de datos PostgreSQL
  # ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fightmatch_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fightmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fightmatch_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fightmatch}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fightmatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fightmatch_net

  # ──────────────────────────────────────────
  # Backend Express
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fightmatch_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fightmatch}:${POSTGRES_PASSWORD:-fightmatch_secret}@db:5432/${POSTGRES_DB:-fightmatch}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - fightmatch_net

  # ──────────────────────────────────────────
  # Frontend Next.js
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fightmatch_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - fightmatch_net

volumes:
  db_data:

networks:
  fightmatch_net:
    driver: bridge
